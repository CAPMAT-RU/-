<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ракурс NEWS — Лента</title>
    <style>:root { --bg: #121212; --card: #1e1e1e; --accent: #ff9800; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        
        header { background: #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .logo-wrapper { display: flex; align-items: center; gap: 10px; }
        .site-logo { width: 35px; height: 35px; object-fit: contain; }
        .logo { font-weight: bold; color: var(--accent); font-size: 20px; text-transform: uppercase; }        .search-input { background: #000; border: 1px solid #333; color: var(--text); padding: 8px; border-radius: 4px; width: 200px; outline: none; }
        
        .categories-wrapper { max-width: 1200px; margin: 20px auto; padding: 0 20px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid var(--accent); display: flex; gap: 20px; padding-bottom: 10px; }
        .category-btn { background: none; border: none; color: #aaa; cursor: pointer; text-transform: uppercase; font-size: 13px; font-weight: bold; padding: 5px 0; }
        .category-btn.active { color: var(--accent); }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 8px; border-left: 4px solid var(--accent); text-decoration: none; color: inherit; display: block; transition: 0.2s; }
        .card:hover { transform: translateY(-3px); }
        .card-content { padding: 15px; }.meta { color: var(--accent); font-size: 11px; text-transform: uppercase; }
        h3 { margin: 10px 0; font-size: 17px; }

        #scrollTop { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: #000; padding: 10px 20px; border-radius: 4px; cursor: pointer; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo-wrapper">
            <img src="/images/logo.png" alt="Logo" class="site-logo">
            <div class="logo">Ракурс NEWS</div>
        </div>
        <input type="text" id="searchInput" class="search-input" placeholder="Поиск...">
    </header>

    <div class="categories-wrapper" id="menu">
        <button class="category-btn active" data-category="all">Все новости</button>
        <button class="category-btn" data-category="Государство">Государство</button>
        <button class="category-btn" data-category="Политика">Политика</button>
        <button class="category-btn" data-category="Геополитика">Геополитика</button>
        <button class="category-btn" data-category="Регионы">Регионы</button>
        <button class="category-btn" data-category="Коррупция">Коррупция</button>
        <button class="category-btn" data-category="Спорт">Спорт</button>
        <button class="category-btn" data-category="Стиль">Стиль</button>
        <button class="category-btn" data-category="Шоу-бизнес">Шоу-бизнес</button>
        <button class="category-btn" data-category="Наука">Наука</button>        <button class="category-btn" data-category="Культура">Культура</button>    </div>

    <div class="container">
        <div id="news-container" class="news-grid"></div>    </div>

    <div id="scrollTop">ВВЕРХ</div>

    <script>
        let allNews = [], displayedCount = 0, currentCategory = 'all';
        const batchSize = 12;

        async function loadNews() {
            const res = await fetch('news.json');
            allNews = await res.json();
            allNews.sort((a, b) => new Date(b.date) - new Date(a.date));
            renderNews(batchSize);
        }

        function renderNews(count, append = false) {
            const container = document.getElementById('news-container');
            if (!append) container.innerHTML = '';
            
            let filtered = currentCategory === 'all' ? allNews : allNews.filter(n => n.category === currentCategory);
            filtered.slice(append ? displayedCount : 0, count).forEach(item => {
                container.innerHTML += `
                    <a href="news.html?id=${item.id}" class="card">
                        <div class="card-content">
                            <span class="meta">${item.category} • ${item.date}</span>
                            <h3>${item.title}</h3>
                        </div>
                    </a>`;
            });
            displayedCount = append ? displayedCount + batchSize : batchSize;
        }

        window.onscroll = () => {
            const btn = document.getElementById('scrollTop');
            if (window.scrollY > 500) btn.style.display = 'block'; else btn.style.display = 'none';if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) renderNews(displayedCount + batchSize, true);
        };

        document.getElementById('scrollTop').onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

        document.getElementById('menu').addEventListener('click', (e) => {
            if(!e.target.classList.contains('category-btn')) return;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentCategory = e.target.dataset.category;
            window.scrollTo({top:0, behavior: 'smooth'});
            renderNews(batchSize);
        });

        loadNews();    </script>
</body>
</html>
